name: test
on: [push, pull_request]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: taskapp_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskapp_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: silent
      JWT_SECRET: test-access
      JWT_REFRESH_SECRET: test-refresh
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/taskapp_dev
      CORS_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:migrate
      - run: pnpm lint
      - run: pnpm test
