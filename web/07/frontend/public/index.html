<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Production Lab</title>
    <style>
        body {
            font-family: monospace;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
        }

        button {
            margin: 4px;
            padding: 7px 14px;
            cursor: pointer;
        }

        pre {
            background: #f4f4f4;
            padding: 14px;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        .err {
            color: #c00;
        }

        .ok {
            color: #080;
        }
    </style>
</head>

<body>
    <h1>Production Concepts Lab</h1>

    <h2>Direct (cross-origin: 3000 → 4000)</h2>
    <button onclick="go('GET',  'http://localhost:4000/status')">GET /status direct</button>
    <button onclick="go('POST', 'http://localhost:4000/echo', {hello:'world'})">POST /echo direct</button>

    <h2>Proxied (same-origin via /api/*)</h2>
    <button onclick="go('GET',  '/api/status')">GET /api/status proxied</button>
    <button onclick="go('POST', '/api/echo', {hello:'proxied'})">POST /api/echo proxied</button>

    <h2>Auth / Cache</h2>
    <button onclick="go('GET', '/api/protected')">GET /protected (no token)</button>
    <button onclick="go('GET', '/api/protected', null, {Authorization:'Bearer secret-token'})">GET /protected (with
        token)</button>
    <button onclick="go('GET', '/api/live-data')">GET /live-data (no-store)</button>
    <button onclick="go('GET', '/api/static/script.js')">GET /static/script.js (cached)</button>

    <h2>Response</h2>
    <pre id="out">Click a button...</pre>

    <script>
        async function go(method, url, body = null, extraHeaders = {}) {
            const out = document.getElementById("out");
            try {
                const opts = { method, headers: { ...extraHeaders } };
                if (body) {
                    opts.headers["Content-Type"] = "application/json";
                    opts.body = JSON.stringify(body);
                }
                const res = await fetch(url, opts);
                const data = await res.json().catch(() => res.text());
                out.className = res.ok ? "ok" : "err";
                out.textContent = `${method} ${url}\nStatus: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
            } catch (err) {
                out.className = "err";
                out.textContent = `${method} ${url}\nFailed: ${err.message}\n(Check Console for CORS details)`;
            }
        }
    </script>
</body>

</html>
