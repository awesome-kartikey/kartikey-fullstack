<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSR Slow Page</title>
</head>

<body>
    <div id="app"> </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const appDiv = document.getElementById('app');

            appDiv.innerHTML = `
        <div style="width:200px;height:24px;background:#e0e0e0;border-radius:4px;margin-bottom:8px"></div>
        <div style="width:100px;height:16px;background:#e0e0e0;border-radius:4px"></div>
        <p style="color:#999;font-size:14px">Loading product...</p>
      `;

            fetch('/api/product-slow')
                .then(r => r.json())
                .then(product => {
                    appDiv.innerHTML = `
            <h2>${product.name}</h2>
            <p>Price: ${product.price}</p>
            <p>Stock: ${product.stock}</p>
          `;
                });
        });
    </script>
</body>

</html>
