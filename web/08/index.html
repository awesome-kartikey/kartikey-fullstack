<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            max-width: 420px;
            margin: 60px auto;
            padding: 0 20px;
            background: #0f0f0f;
            color: #e0e0e0;
        }

        h2 {
            font-size: 1.1rem;
            color: #7ec8e3;
            margin-bottom: 16px;
        }

        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            border-radius: 4px;
            font-family: monospace;
        }

        button {
            padding: 10px 18px;
            margin: 4px 4px 4px 0;
            cursor: pointer;
            background: #1a1a1a;
            border: 1px solid #555;
            color: #e0e0e0;
            border-radius: 4px;
            font-family: monospace;
        }

        button:hover {
            border-color: #7ec8e3;
            color: #7ec8e3;
        }

        #status {
            padding: 12px;
            border-radius: 4px;
            margin: 16px 0;
            font-size: 0.85rem;
            min-height: 20px;
        }

        .ok {
            background: #0d2b1a;
            color: #4ade80;
            border: 1px solid #166534;
        }

        .err {
            background: #2b0d0d;
            color: #f87171;
            border: 1px solid #7f1d1d;
        }

        #user-card {
            display: none;
        }

        #login-form {
            display: block;
        }

        #log {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
            border-top: 1px solid #222;
            padding-top: 12px;
        }

        #log p {
            margin: 2px 0;
        }
    </style>
</head>

<body>
    <div id="login-form">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="username  (try: kartikey)" />
        <input type="password" id="password" placeholder="password  (try: secret)" />
        <button onclick="login()">Log In</button>
    </div>

    <div id="user-card">
        <h2>Authenticated</h2>
        <p>Logged in as: <strong id="user-display"></strong></p>
        <button onclick="checkSession()">Check /me</button>
        <button onclick="logout()">Log Out</button>
        <button onclick="testTokenFlow()">Test Token Flow</button>
    </div>
    <div id="status"></div>
    <div id="log"></div>

    <script>
        const API_BASE = "http://localhost:3000";

        function setStatus(msg, ok) {
            const statusEl = document.getElementById("status");
            statusEl.textContent = msg;
            statusEl.className = ok ? "ok" : "err";
        }

        function addLog(msg) {
            const logEl = document.getElementById("log");
            const p = document.createElement("p");
            p.textContent = new Date().toISOString() + " " + msg;
            logEl.appendChild(p);
        }

        function showUserCard(username) {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("user-card").style.display = "block";
            document.getElementById("user-display").textContent = username;
        }

        function showLoginForm() {
            document.getElementById("login-form").style.display = "block";
            document.getElementById("user-card").style.display = "none";
        }

        windows.addEventListener("load", checkSession)

        async function checkSession() {
            try {
                const res = await fetch(`${API_BASE}/me`, {
                    credentials: "include"
                });

                addLog(`Check session response: ${res.status}`);

                if (res.ok) {
                    const data = await res.json();
                    showUserCard(data.user.username);
                    setStatus(`Logged in as ${data.user.username}`, true);
                } else {
                    showLoginForm();
                    setStatus("Not logged in", false);
                }
            } catch (error) {
                showLoginForm();
                setStatus("Network error" + error.message, false);
            }
        }

        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                    credentials: "include"
                });

                addLog(`Login response: ${res.status}`);
                const data = await res.json();

                if (res.ok) {
                    showUserCard(data.user.username);
                    setStatus("Login successful " + data.message, true);
                } else {
                    showLoginForm()
                    setStatus("Login failed " + data.message, false);
                }
            }
            catch (error) {
                setStatus("Login failed " + error.message, false);
            }
        }



        async function logout() {
            try {
                const res = await fetch(`${API_BASE}/logout`, {
                    method: "POST",
                    credentials: "include"
                });
                const data = await res.json();
                addLog(`Logout response: ${res.status}`);
                if (res.ok) {
                    setStatus("Logged out " + data.message, true);
                    showLoginForm();
                }

            } catch (error) {
                setStatus("Logout failed " + error.message, false);
            }

        }

        async function testTokenFlow() {

            try {
                const loginRes = await fetch(`${API_BASE}/token-login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: "kartikey", password: "secrethunter" })
                });

                const { token } = await loginRes.json();
                addLog(`Login response: ${loginRes.status}`);

                if (loginRes.ok) {
                    const tokenRes = await fetch(`${API_BASE}/token-protected`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });

                    const { user } = await tokenRes.json();

                    addLog(`Token protected response: ${tokenRes.status}`);
                    if (tokenRes.ok) {
                        setStatus(`Token protected endpoint: ${user.username}`, true);
                    } else {
                        setStatus("Token protected endpoint failed", false);
                    }
                }

            } catch (error) {
                setStatus("Token flow failed " + error.message, false);
            }
        }
